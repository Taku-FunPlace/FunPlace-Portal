<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FUNPLACE横浜 メンバー選考</title>
<style>
  :root {
    --green: #1a6b3a;
    --green-light: #2a8a4e;
    --green-dark: #0f4023;
    --accent: #f0c430;
    --bg: #0e1a14;
    --surface: #1c2e22;
    --surface2: #253422;
    --text: #e8f0e9;
    --text-muted: #7a9a7e;
    --red: #e05555;
    --border: #2e4a35;
    --selected: #f0c430;
    --starter-color: #4ecb71;
    --bench-color: #5bb8d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--green-dark);
    padding: 12px 16px 10px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 2px solid var(--accent);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; line-height: 1.3; }
  .logo span { display: block; font-size: 17px; letter-spacing: 2px; }
  .match-info { margin-left: auto; text-align: right; }
  .match-date { font-size: 11px; color: var(--text-muted); }
  .match-opponent { font-size: 13px; font-weight: 600; }

  /* TABS */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; transition: all 0.2s; cursor: pointer; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ===== ATTENDANCE ===== */
  #panel-attendance { padding: 12px; padding-bottom: 80px; }
  .match-edit { display: flex; gap: 8px; margin-bottom: 10px; }
  .match-input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  .match-input::placeholder { color: var(--text-muted); }
  .attendance-summary { background: var(--surface); border-radius: 10px; padding: 10px 14px; display: flex; gap: 16px; margin-bottom: 10px; }
  .att-stat { text-align: center; }
  .att-num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .att-label { font-size: 10px; color: var(--text-muted); }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; padding: 6px 0 6px; }
  .attendance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .player-card {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 12px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .player-card.present { border-color: var(--green-light); background: #1e3d2a; }
  .player-card.absent { opacity: 0.4; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .player-card.present .status-dot { background: #4ecb71; }
  .player-name { font-size: 13px; font-weight: 600; line-height: 1.2; }
  .player-pos-tag { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* ===== LINEUP ===== */
  #panel-lineup { display: none; flex-direction: column; height: calc(100vh - 100px); position: relative; }
  #panel-lineup.active { display: flex; }

  /* 上部：参加メンバーパレット */
  .member-palette {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 10px;
    flex-shrink: 0;
    position: relative; z-index: 1;
  }
  .palette-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
  }
  .palette-title { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; }
  .palette-hint { font-size: 10px; color: var(--accent); font-weight: 600; }
  .palette-players {
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .palette-player {
    padding: 5px 9px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text-muted); cursor: pointer; transition: all 0.12s;
    position: relative;
  }
  .palette-player.status-starter {
    border-color: var(--starter-color); color: var(--starter-color);
    background: rgba(78,203,113,0.1);
  }
  .palette-player.status-bench {
    border-color: var(--bench-color); color: var(--bench-color);
    background: rgba(91,184,212,0.1);
  }
  .palette-player.status-none {
    border-color: var(--border); color: var(--text);
    background: var(--surface2);
  }
  .palette-player.selected {
    border-color: var(--accent) !important; background: rgba(240,196,48,0.2) !important;
    color: var(--accent) !important; transform: scale(1.05);
    box-shadow: 0 0 0 2px rgba(240,196,48,0.4);
  }
  .palette-empty { font-size: 12px; color: var(--text-muted); padding: 4px 0; }

  /* 中部：ピッチ＋フォーメーション */
  .pitch-area {
    flex: 1; overflow-y: auto; padding: 8px 10px;
    padding-bottom: 100px;
    position: relative; z-index: 1;
  }
  .formation-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .formation-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .formation-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 6px 10px; font-size: 14px; font-weight: 700; flex: 1;
    -webkit-appearance: none;
  }

  .pitch-container { position: relative; background: #2d7a45; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
  .pitch-svg { width: 100%; display: block; }
  .pitch-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

  /* SLOT */
  .slot {
    position: absolute; transform: translate(-50%, -50%);
    width: 66px; display: flex; flex-direction: column; align-items: center; gap: 2px;
    cursor: pointer; touch-action: none; user-select: none;
  }
  .slot-circle {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,0.12); border: 2px dashed rgba(255,255,255,0.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: rgba(255,255,255,0.55); font-weight: 700;
    transition: background 0.15s, border 0.15s;
  }
  .slot.filled .slot-circle {
    background: var(--accent); border: 2px solid #fff; color: #000; font-size: 11px; font-weight: 800;
  }
  .slot.slot-ready .slot-circle {
    border: 2px solid var(--accent); background: rgba(240,196,48,0.2);
    animation: pulse 1s infinite;
  }
  .slot.dragging { opacity: 0.85; z-index: 50; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6)); }
  .slot.dragging .slot-circle { transform: scale(1.2); background: var(--accent) !important; border-color: #fff !important; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(240,196,48,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(240,196,48,0); }
  }
  .slot-label { font-size: 10px; color: rgba(255,255,255,0.75); font-weight: 600; text-align: center; max-width: 66px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slot-pos { font-size: 9px; color: rgba(255,255,255,0.45); }
  .pitch-area.dragging-active { overflow-y: hidden; }

  /* BENCH AREA */
  .bench-area { background: #1a2e35; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
  .bench-title { font-size: 11px; color: var(--bench-color); font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .bench-drop-hint { font-size: 10px; color: var(--text-muted); font-weight: 400; }
  .bench-list { display: flex; flex-wrap: wrap; gap: 5px; min-height: 32px; }
  .bench-chip {
    padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--bench-color); color: var(--bench-color);
    background: rgba(91,184,212,0.1); cursor: pointer; transition: all 0.12s;
  }
  .bench-chip:active { opacity: 0.7; }
  /* ベンチエリア：選手選択中は受け入れ可能表示 */
  .bench-area.slot-ready { border: 2px solid var(--accent); }

  /* SAVE BAR */
  .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--green-dark); border-top: 2px solid var(--accent); padding: 10px 16px; display: flex; gap: 8px; z-index: 500; }
  .btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn:active { transform: scale(0.97); }

  /* HISTORY */
  #panel-history { padding: 12px; padding-bottom: 80px; }
  .history-empty { text-align: center; color: var(--text-muted); padding: 40px 0; font-size: 14px; }
  .history-card { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .history-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .history-date { font-size: 11px; color: var(--text-muted); }
  .history-opponent { font-size: 14px; font-weight: 700; }
  .history-formation { font-size: 11px; color: var(--accent); font-weight: 700; }
  .history-players { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .h-tag-starter { background: rgba(78,203,113,0.15); color: var(--starter-color); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .h-tag-bench { background: var(--surface2); color: var(--text-muted); border-radius: 6px; padding: 2px 8px; font-size: 11px; }
  .history-del { padding: 4px 10px; background: none; border: 1px solid var(--red); color: var(--red); border-radius: 6px; font-size: 11px; cursor: pointer; flex-shrink: 0; }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* 選択中バナー */
  .selection-banner {
    display: none; background: rgba(240,196,48,0.15); border: 1px solid var(--accent);
    border-radius: 8px; padding: 7px 12px; margin-bottom: 8px;
    font-size: 12px; color: var(--accent); font-weight: 700;
    display: none; align-items: center; justify-content: space-between;
  }
  .selection-banner.visible { display: flex; }
  .cancel-sel { font-size: 11px; color: var(--text-muted); padding: 2px 8px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; background: var(--surface2); }
</style>
</head>
<body>

<header>
  <div class="logo">FUN PLACE<span>横浜</span></div>
  <div class="match-info">
    <div class="match-date" id="header-date">試合日未設定</div>
    <div class="match-opponent" id="header-opponent">対戦相手未設定</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('attendance')">① 出欠</div>
  <div class="tab" onclick="switchTab('lineup')">② ラインナップ</div>
  <div class="tab" onclick="switchTab('history')">📋 履歴</div>
</div>

<!-- ===== ATTENDANCE ===== -->
<div id="panel-attendance" class="panel active emblem-bg">
  <div style="padding:12px 12px 0">
    <div class="match-edit">
      <input class="match-input" type="date" id="input-date" placeholder="試合日">
      <input class="match-input" type="text" id="input-opponent" placeholder="対戦相手">
    </div>
    <div class="attendance-summary">
      <div class="att-stat"><div class="att-num" id="att-present">0</div><div class="att-label">参加</div></div>
      <div class="att-stat"><div class="att-num" id="att-absent">0</div><div class="att-label">不参加</div></div>
      <div class="att-stat"><div class="att-num" id="att-total">0</div><div class="att-label">登録</div></div>
    </div>
    <div class="section-title">タップで出欠切替</div>
  </div>
  <div style="padding:0 12px 80px">
    <div class="attendance-grid" id="attendance-grid"></div>
  </div>
</div>

<!-- ===== LINEUP ===== -->
<div id="panel-lineup" class="panel">

  <!-- 参加メンバーパレット（常時表示） -->
  <div class="member-palette">

    <div class="selection-banner" id="selection-banner">

  '4-3-3':   [{pos:'GK',x:50,y:91},{pos:'RB',x:82,y:76},{pos:'CB',x:62,y:73},{pos:'CB',x:38,y:73},{pos:'LB',x:18,y:76},{pos:'CM',x:75,y:52},{pos:'CM',x:50,y:50},{pos:'CM',x:25,y:52},{pos:'RW',x:82,y:20},{pos:'CF',x:50,y:15},{pos:'LW',x:18,y:20}],
  '4-2-3-1': [{pos:'GK',x:50,y:91},{pos:'RB',x:82,y:76},{pos:'CB',x:62,y:73},{pos:'CB',x:38,y:73},{pos:'LB',x:18,y:76},{pos:'DM',x:63,y:61},{pos:'DM',x:37,y:61},{pos:'RM',x:80,y:44},{pos:'AM',x:50,y:42},{pos:'LM',x:20,y:44},{pos:'ST',x:50,y:18}],
  '3-4-3':   [{pos:'GK',x:50,y:91},{pos:'CB',x:72,y:74},{pos:'CB',x:50,y:72},{pos:'CB',x:28,y:74},{pos:'RM',x:82,y:55},{pos:'CM',x:62,y:52},{pos:'CM',x:38,y:52},{pos:'LM',x:18,y:55},{pos:'RW',x:80,y:20},{pos:'CF',x:50,y:16},{pos:'LW',x:20,y:20}],
  '3-5-2':   [{pos:'GK',x:50,y:91},{pos:'CB',x:72,y:74},{pos:'CB',x:50,y:72},{pos:'CB',x:28,y:74},{pos:'RM',x:85,y:52},{pos:'CM',x:67,y:50},{pos:'CM',x:50,y:48},{pos:'CM',x:33,y:50},{pos:'LM',x:15,y:52},{pos:'ST',x:62,y:18},{pos:'ST',x:38,y:18}],
  '5-4-1':   [{pos:'GK',x:50,y:91},{pos:'RWB',x:88,y:72},{pos:'CB',x:70,y:76},{pos:'CB',x:50,y:78},{pos:'CB',x:30,y:76},{pos:'LWB',x:12,y:72},{pos:'RM',x:80,y:52},{pos:'CM',x:60,y:50},{pos:'CM',x:40,y:50},{pos:'LM',x:20,y:52},{pos:'ST',x:50,y:18}],
  '4-1-4-1': [{pos:'GK',x:50,y:91},{pos:'RB',x:82,y:76},{pos:'CB',x:62,y:73},{pos:'CB',x:38,y:73},{pos:'LB',x:18,y:76},{pos:'DM',x:50,y:61},{pos:'RM',x:84,y:46},{pos:'CM',x:64,y:44},{pos:'CM',x:36,y:44},{pos:'LM',x:16,y:46},{pos:'ST',x:50,y:18}],
};

// ========== STATE ==========
let state = {
  attendance: {},
  starters: [],       // [{slotIdx, playerId}]
  bench: [],          // [playerId]
  formation: '4-4-2',
  slotPositions: {},  // {slotIdx: {x, y}} フォーメーションからの位置オーバーライド
  matchDate: '',
  opponent: '',
};

// 選択中の選手ID（パレットからタップして選択）
let selectedPlayerId = null;

function loadState() {
  const saved = localStorage.getItem('funplace_lineup');
  if (saved) { try { state = JSON.parse(saved); } catch(e){} }
  PLAYERS.forEach(p => { if (state.attendance[p.id] === undefined) state.attendance[p.id] = false; });
}
function saveState() { localStorage.setItem('funplace_lineup', JSON.stringify(state)); }

// ========== TOAST ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ========== ATTENDANCE ==========
function renderAttendance() {
  const grid = document.getElementById('attendance-grid');
  grid.innerHTML = '';
  let present = 0, absent = 0;
  PLAYERS.forEach(p => {
    const isPresent = !!state.attendance[p.id];
    if (isPresent) present++; else absent++;
    const card = document.createElement('div');
    card.className = `player-card ${isPresent ? 'present' : 'absent'}`;
    const numStr = p.num != null ? `#${p.num}` : '';
    card.innerHTML = `<div class="status-dot"></div><div><div class="player-name">${p.name}</div><div class="player-pos-tag">${p.pos}${numStr ? ' · ' + numStr : ''}</div></div>`;
    card.onclick = () => {
      state.attendance[p.id] = !state.attendance[p.id];
      if (!state.attendance[p.id]) {
        state.starters = state.starters.filter(s => s.playerId !== p.id);
        state.bench = state.bench.filter(id => id !== p.id);
      }
      saveState();
      renderAttendance();
      renderPalette();
      renderPitch();
      renderBench();
    };
    grid.appendChild(card);
  });
  document.getElementById('att-present').textContent = present;
  document.getElementById('att-absent').textContent = absent;
  document.getElementById('att-total').textContent = PLAYERS.length;
}

// ========== PALETTE（常時表示メンバー一覧） ==========
function getPlayerStatus(id) {
  if (state.starters.find(s => s.playerId === id)) return 'starter';
  if (state.bench.includes(id)) return 'bench';
  return 'none';
}

function renderPalette() {
  const container = document.getElementById('palette-players');
  const present = PLAYERS.filter(p => state.attendance[p.id]);
  if (present.length === 0) {
    container.innerHTML = '<span class="palette-empty">①出欠タブで参加メンバーを選択してください</span>';
    return;
  }
  container.innerHTML = '';
  present.forEach(p => {
    const status = getPlayerStatus(p.id);
    const isSelected = selectedPlayerId === p.id;
    const el = document.createElement('div');
    el.className = `palette-player status-${status} ${isSelected ? 'selected' : ''}`;
    el.textContent = (p.num != null ? `${p.num} ` : '') + p.name.replace(' ', '');
    el.dataset.pid = p.id;
    el.onclick = () => onPalettePlayerTap(p.id);
    container.appendChild(el);
  });

  // ヒント更新
  const hint = document.getElementById('palette-hint');
  if (selectedPlayerId) {
    hint.textContent = '→ピッチかベンチをタップ';
  } else {
    hint.textContent = 'タップして選手を選択';
  }
}

function onPalettePlayerTap(pid) {
  if (selectedPlayerId === pid) {
    // 同じ選手を再タップ→選択解除
    cancelSelection();
    return;
  }
  selectedPlayerId = pid;
  renderPalette();
  renderPitch();
  updateBenchAreaStyle();
  updateSelectionBanner();
}

function cancelSelection() {
  selectedPlayerId = null;
  renderPalette();
  renderPitch();
  updateBenchAreaStyle();
  updateSelectionBanner();
}

function updateSelectionBanner() {
  const banner = document.getElementById('selection-banner');
  if (selectedPlayerId) {
    const p = PLAYERS.find(pl => pl.id === selectedPlayerId);
    document.getElementById('banner-text').textContent = `「${p.name}」を選択中`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function updateBenchAreaStyle() {
  const area = document.getElementById('bench-area');
  const hint = document.getElementById('bench-drop-hint');
  if (selectedPlayerId) {
    area.classList.add('slot-ready');
    hint.textContent = '← タップしてベンチに追加';
  } else {
    area.classList.remove('slot-ready');
    hint.textContent = '（タップで外す）';
  }
}

// ========== PITCH ==========
function getSlotPos(idx, slotDef) {
  // stateにカスタム位置があればそちらを使う
  if (state.slotPositions && state.slotPositions[idx] !== undefined) {
    return state.slotPositions[idx];
  }
  return { x: slotDef.x, y: slotDef.y };
}

function renderPitch() {
  const overlay = document.getElementById('pitch-overlay');
  overlay.innerHTML = '';
  const slots = FORMATIONS[state.formation] || FORMATIONS['4-4-2'];

  slots.forEach((slotDef, idx) => {
    const starter = state.starters.find(s => s.slotIdx === idx);
    const player = starter ? PLAYERS.find(p => p.id === starter.playerId) : null;
    const isReady = !!selectedPlayerId;
    const pos = getSlotPos(idx, slotDef);

    const el = document.createElement('div');
    el.className = `slot ${player ? 'filled' : ''} ${isReady && !player ? 'slot-ready' : ''}`;
    el.style.left = pos.x + '%';
    el.style.top = pos.y + '%';
    el.dataset.slotIdx = idx;

    const numLabel = player ? (player.num != null ? player.num : player.name.replace(' ','').slice(0,2)) : '';
    const nameLabel = player ? player.name.replace(' ','') : '';
    el.innerHTML = `
      <div class="slot-circle">${player ? numLabel : slotDef.pos}</div>
      <div class="slot-label">${nameLabel}</div>
      <div class="slot-pos">${slotDef.pos}</div>
    `;

    // タップ（ドラッグと区別するため touchstart/touchend で判定）
    setupSlotInteraction(el, idx, slotDef);
    overlay.appendChild(el);
  });
}

// ドラッグ vs タップ両対応（mouse + touch）
function setupSlotInteraction(el, idx, slotDef) {
  let startX = 0, startY = 0;
  let isDragging = false;
  let dragStarted = false; // mousedown/touchstart後にmovが起きたか
  const DRAG_THRESHOLD = 6;

  // ---- 共通ヘルパー ----
  function getXY(e) {
    return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                     : { x: e.clientX, y: e.clientY };
  }

  function onStart(e) {
    const { x, y } = getXY(e);
    startX = x; startY = y;
    isDragging = false; dragStarted = false;
  }

  function onMove(e) {
    if (selectedPlayerId) return; // 選手選択中はドラッグ不可
    const { x, y } = getXY(e);
    const dx = x - startX, dy = y - startY;
    if (!isDragging && Math.sqrt(dx*dx + dy*dy) > DRAG_THRESHOLD) {
      isDragging = true; dragStarted = true;
      startDrag(el, idx, { clientX: x, clientY: y });
    }
    if (isDragging) {
      e.preventDefault();
      moveDrag(el, idx, { clientX: x, clientY: y });
    }
  }

  function onEnd(e) {
    if (isDragging) {
      endDrag(el, idx);
      isDragging = false;
      if (e.cancelable) e.preventDefault(); // onclick 抑制
    }
  }

  // ---- Touch ----
  el.addEventListener('touchstart', onStart, { passive: true });
  el.addEventListener('touchmove',  onMove,  { passive: false });
  el.addEventListener('touchend',   onEnd);

  // ---- Mouse ----
  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    onStart(e);
    // mousemove/mouseup はdocumentで拾う（要素外に出ても追随）
    const onMM = (e) => onMove(e);
    const onMU = (e) => {
      onEnd(e);
      document.removeEventListener('mousemove', onMM);
      document.removeEventListener('mouseup',   onMU);
    };
    document.addEventListener('mousemove', onMM);
    document.addEventListener('mouseup',   onMU);
  });

  // ---- クリック（tap/click 共通） ----
  el.addEventListener('click', (e) => {
    if (dragStarted) { dragStarted = false; return; } // ドラッグ後は無視
    const currentStarter = state.starters.find(s => s.slotIdx === idx);
    const currentPlayer  = currentStarter ? PLAYERS.find(p => p.id === currentStarter.playerId) : null;
    onSlotTap(idx, slotDef, currentPlayer);
  });
}

// ドラッグ処理
let dragOffsetX = 0, dragOffsetY = 0;

function startDrag(el, idx, touch) {
  el.classList.add('dragging');
  document.querySelector('.pitch-area').classList.add('dragging-active');
  const pitchRect = document.getElementById('pitch-container').getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  dragOffsetX = touch.clientX - (elRect.left + elRect.width/2);
  dragOffsetY = touch.clientY - (elRect.top + elRect.height/2);
}

function moveDrag(el, idx, touch) {
  const pitchEl = document.getElementById('pitch-container');
  const rect = pitchEl.getBoundingClientRect();
  let x = ((touch.clientX - dragOffsetX - rect.left) / rect.width) * 100;
  let y = ((touch.clientY - dragOffsetY - rect.top) / rect.height) * 100;
  // ピッチ内にクランプ
  x = Math.max(5, Math.min(95, x));
  y = Math.max(3, Math.min(97, y));
  el.style.left = x + '%';
  el.style.top = y + '%';
}

function endDrag(el, idx) {
  el.classList.remove('dragging');
  document.querySelector('.pitch-area').classList.remove('dragging-active');
  const x = parseFloat(el.style.left);
  const y = parseFloat(el.style.top);
  if (!state.slotPositions) state.slotPositions = {};
  state.slotPositions[idx] = { x, y };
  saveState();
}

function onSlotTap(slotIdx, slotDef, currentPlayer) {
  if (selectedPlayerId) {
    // 選手選択中 → このスロットに配置
    const pid = selectedPlayerId;

    // 既にどこかのスロットに入ってたら外す
    state.starters = state.starters.filter(s => s.playerId !== pid);
    // ベンチからも外す
    state.bench = state.bench.filter(id => id !== pid);
    // このスロットの既存を外す
    state.starters = state.starters.filter(s => s.slotIdx !== slotIdx);
    // 配置
    state.starters.push({ slotIdx, playerId: pid });

    const p = PLAYERS.find(pl => pl.id === pid);
    showToast(`${p.name} → ${slotDef.pos}`);
    selectedPlayerId = null;
    saveState();
    renderPalette();
    renderPitch();
    renderBench();
    updateBenchAreaStyle();
    updateSelectionBanner();

  } else if (currentPlayer) {
    // 選手選択なし & スロットに人がいる → その人をスロットから外す
    state.starters = state.starters.filter(s => s.slotIdx !== slotIdx);
    showToast(`${currentPlayer.name} を外しました`);
    saveState();
    renderPalette();
    renderPitch();
    renderBench();
  }
}

// ========== BENCH ==========
function renderBench() {
  const list = document.getElementById('bench-list');
  list.innerHTML = '';
  if (state.bench.length === 0) {
    list.innerHTML = '<span style="color:var(--text-muted);font-size:12px;">ベンチ選手なし</span>';
    return;
  }
  state.bench.forEach(id => {
    const p = PLAYERS.find(pl => pl.id === id);
    if (!p) return;
    const el = document.createElement('div');
    el.className = 'bench-chip';
    el.textContent = p.name;
    el.onclick = () => {
      state.bench = state.bench.filter(bid => bid !== id);
      showToast(`${p.name} をベンチから外しました`);
      saveState();
      renderPalette();
      renderBench();
    };
    list.appendChild(el);
  });
}

// ベンチエリアタップ（選手選択中のみ）
document.getElementById('bench-area').addEventListener('click', (e) => {
  if (!selectedPlayerId) return;
  if (e.target.closest('.bench-chip')) return; // チップタップは別処理
  const pid = selectedPlayerId;
  const p = PLAYERS.find(pl => pl.id === pid);
  // 既にスロットに入ってたら外す
  state.starters = state.starters.filter(s => s.playerId !== pid);
  // 既にベンチにいなければ追加
  if (!state.bench.includes(pid)) {
    state.bench.push(pid);
    showToast(`${p.name} → ベンチ`);
  }
  selectedPlayerId = null;
  saveState();
  renderPalette();
  renderPitch();
  renderBench();
  updateBenchAreaStyle();
  updateSelectionBanner();
});

// ========== FORMATION ==========
function changeFormation() {
  state.formation = document.getElementById('formation-select').value;
  state.starters = [];
  state.slotPositions = {};
  saveState();
  renderPitch();
  renderPalette();
  showToast(`フォーメーション: ${state.formation}`);
}

// ========== RESET ==========
function resetLineup() {
  if (!confirm('スターター・ベンチをリセットしますか？')) return;
  state.starters = [];
  state.bench = [];
  state.slotPositions = {};
  selectedPlayerId = null;
  saveState();
  renderPalette();
  renderPitch();
  renderBench();
  updateBenchAreaStyle();
  updateSelectionBanner();
}

// ========== SAVE MATCH ==========
function saveMatch() {
  const date = document.getElementById('input-date').value;
  const opponent = document.getElementById('input-opponent').value;
  if (!date || !opponent) { alert('試合日と対戦相手を入力してください（①出欠タブ）'); return; }
  const starters = state.starters.map(s => PLAYERS.find(p => p.id === s.playerId)?.name).filter(Boolean);
  const bench = state.bench.map(id => PLAYERS.find(p => p.id === id)?.name).filter(Boolean);
  if (starters.length === 0) { alert('スターターを設定してください'); return; }
  let history = getHistory();
  history.unshift({ id: Date.now(), date, opponent, formation: state.formation, starters, bench });
  localStorage.setItem('funplace_history', JSON.stringify(history));
  showToast('保存しました！');
  renderHistory();
}

// ========== HISTORY ==========
function getHistory() {
  try { return JSON.parse(localStorage.getItem('funplace_history')) || []; } catch(e) { return []; }
}
function renderHistory() {
  const list = document.getElementById('history-list');
  const history = getHistory();
  if (history.length === 0) { list.innerHTML = '<div class="history-empty">保存した試合がありません</div>'; return; }
  list.innerHTML = history.map(h => `
    <div class="history-card">
      <div class="history-card-header">
        <div>
          <div class="history-date">${h.date}</div>
          <div class="history-opponent">vs ${h.opponent}</div>
          <div class="history-formation">${h.formation}</div>
        </div>
        <button class="history-del" onclick="deleteHistory(${h.id})">削除</button>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px;">スタメン</div>
      <div class="history-players">${h.starters.map(n=>`<span class="h-tag-starter">${n}</span>`).join('')}</div>
      ${h.bench.length > 0 ? `<div style="font-size:11px;color:var(--text-muted);margin:5px 0 3px;">ベンチ</div><div class="history-players">${h.bench.map(n=>`<span class="h-tag-bench">${n}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
}
function deleteHistory(id) {
  if (!confirm('削除しますか？')) return;
  localStorage.setItem('funplace_history', JSON.stringify(getHistory().filter(h => h.id !== id)));
  renderHistory();
}

// ========== MATCH INFO ==========
function initMatchInputs() {
  const dateEl = document.getElementById('input-date');
  const oppEl = document.getElementById('input-opponent');
  dateEl.value = state.matchDate || '';
  oppEl.value = state.opponent || '';
  dateEl.oninput = () => { state.matchDate = dateEl.value; updateHeader(); saveState(); };
  oppEl.oninput = () => { state.opponent = oppEl.value; updateHeader(); saveState(); };
  updateHeader();
}
function updateHeader() {
  document.getElementById('header-date').textContent = state.matchDate || '試合日未設定';
  document.getElementById('header-opponent').textContent = state.opponent ? `vs ${state.opponent}` : '対戦相手未設定';
}

// ========== TAB ==========
function switchTab(tab) {
  ['attendance','lineup','history'].forEach((t,i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', t === tab);
    document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'lineup') {
    renderPalette();
    renderPitch();
    renderBench();
    document.getElementById('formation-select').value = state.formation;
  }
  if (tab === 'history') renderHistory();
}

// ========== INIT ==========
loadState();
initMatchInputs();
renderAttendance();
renderHistory();
</script>
