  /* ===== CROSS TABLE ===== */
  table.cross {
    border-collapse: collapse;
    width: 100%;
    min-width: 560px;
    background-color: #111f11;
    font-size: 12px;
  }

  table.cross th, table.cross td {
    border: 1px solid #1e3a1e;
    text-align: center;
    padding: 0;
  }

  table.cross thead th {
    background: rgba(22,46,22,0.95);
    color: #a5d6a7;
    font-weight: 600;
    font-size: 10px;
    padding: 8px 4px;
    white-space: nowrap;
  }

  table.cross thead th:first-child {
    text-align: left;
    padding-left: 10px;
    min-width: 130px;
  }

  table.cross td:first-child {
    text-align: left;
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 600;
    color: #c8e6c9;
    background: transparent;
    white-space: nowrap;
  }

  /* My team highlight */
  table.cross tr.myteam td:first-child {
    color: #ffeb3b;
    background: transparent;
  }
  table.cross thead th.myteam-col {
    background: rgba(28,43,10,0.95);
    color: #ffeb3b;
  }
  table.cross td.myteam-col {
    background: transparent;
  }

  /* Upper-right triangle (already stored in lower-left mirror) */
  td.mirror {
    background: transparent !important;
    cursor: default;
    color: #1e3a1e;
    font-size: 10px;
  }

  /* Diagonal */
  td.diagonal {
    background: transparent !important;
    cursor: default;
  }

  /* Result cell */
  td.result-cell {
    cursor: pointer;
    min-width: 46px;
    height: 36px;
    transition: background 0.15s;
  }
  td.result-cell:hover { background: rgba(30,58,30,0.85) !important; }

  .result-text {
    font-size: 12px;
    font-weight: 700;
    color: #e8f5e9;
    display: block;
  }
  /* For row team perspective */
  .result-text.win  { color: #66bb6a; }
  .result-text.draw { color: #ffa726; }
  .result-text.lose { color: #ef5350; }
  .result-text.empty { color: #2e4a2e; font-weight: 400; font-size: 10px; }

  /* ===== STANDINGS TABLE ===== */
  table.standings {
    border-collapse: collapse;
    width: 100%;
    background: #111f11;
    font-size: 13px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #1e3a1e;
  }

  table.standings thead tr {
    background: #162e16;
    color: #a5d6a7;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  table.standings th {
    padding: 10px 12px;
    text-align: center;
  }
  table.standings th:nth-child(2) { text-align: left; }

  table.standings tbody tr {
    border-top: 1px solid #1a301a;
    transition: background 0.1s;
  }
  table.standings tbody tr:hover { background: #162016; }
  table.standings tbody tr.myteam { background: #1c2b0a; }
  table.standings tbody tr.myteam:hover { background: #222e0c; }

  table.standings td {
    padding: 10px 12px;
    text-align: center;
    color: #c8e6c9;
  }
  table.standings td:nth-child(2) {
    text-align: left;
    font-weight: 600;
    color: #e8f5e9;
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    background: #1e3a1e;
    color: #81c784;
  }
  .rank-badge.top1 { background: #f9a825; color: #1a1a00; }
  .rank-badge.top2 { background: #78909c; color: #fff; }
  .rank-badge.top3 { background: #8d6e63; color: #fff; }

  .team-star { color: #ffeb3b; margin-right: 4px; font-size: 10px; }
  td.pts { font-weight: 800; font-size: 15px; color: #fff; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  .stat-lbl {
    font-size: 10px;
    color: #4caf50;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .stat-divider { width: 1px; background: #1e3a1e; align-self: stretch; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #162e16;
    border: 1px solid #2e6b2e;
    border-radius: 12px;
    padding: 24px 28px;
    width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .modal h2 {
    font-size: 13px;
    color: #a5d6a7;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .modal .matchup {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .modal .matchup span { color: #4caf50; }

  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .score-label { font-size: 11px; color: #81c784; min-width: 60px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-label.right { text-align: left; }
  .score-input {
    width: 58px;
    background: #0f1f0f;
    border: 1px solid #2e6b2e;
    border-radius: 6px;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    padding: 6px 4px;
    outline: none;
  }
  .score-input:focus { border-color: #4caf50; }
  .score-sep { font-size: 18px; color: #4caf50; font-weight: 700; }

  .modal-btns { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-save { background: #4caf50; color: #fff; }
  .btn-clear { background: #1e3a1e; color: #a5d6a7; border: 1px solid #2e6b2e; }
  .btn-cancel { background: #1e1e1e; color: #888; }

  /* Legend */
  .legend {
    font-size: 10px;
    color: #4a7a4a;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  /* ===== SCHEDULE ===== */
  .btn-add-schedule {
    display: block;
    width: 100%;
    padding: 12px;
    background: #1b3a1b;
    border: 1px dashed #2e6b2e;
    border-radius: 8px;
    color: #81c784;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 32px;
    transition: background 0.15s;
  }
  .btn-add-schedule:hover { background: #1e4a1e; }

  .schedule-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #111f11;
    border: 1px solid #1e3a1e;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .schedule-item:hover { background: #162016; }
  .schedule-item.next {
    border-color: #4caf50;
    background: #132213;
  }
  .schedule-date {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    min-width: 90px;
  }
  .schedule-date .day-label {
    font-size: 10px;
    color: #4caf50;
    font-weight: 600;
    display: block;
    letter-spacing: 1px;
  }
  .schedule-opponent {
    font-size: 13px;
    color: #c8e6c9;
    font-weight: 600;
    flex: 1;
    text-align: center;
  }
  .schedule-next-badge {
    font-size: 9px;
    background: #4caf50;
    color: #fff;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .schedule-empty {
    text-align: center;
    color: #2e4a2e;
    font-size: 13px;
    padding: 20px;
    border: 1px dashed #1e3a1e;
    border-radius: 8px;
    margin-bottom: 8px;
  }

  /* 閲覧モード */
  body.view-mode .edit-only { display: none !important; }
  body.view-mode td.result-cell { cursor: default; pointer-events: none; }
  body.view-mode td.mirror { cursor: default; pointer-events: none; }
</style>

  <div class="stat-item"><div class="stat-num" id="stat-pts" style="color:#fff">0</div><div class="stat-lbl">勝点</div></div>
</div>

<div class="section-title">▸ 対戦結果表</div>
<div class="legend">セルをタップしてスコアを入力 ／ 色：<span style="color:#66bb6a">勝</span>　<span style="color:#ffa726">分</span>　<span style="color:#ef5350">負</span>（行チーム視点）</div>

</div>

<!-- Save -->
<div style="margin-bottom:12px;">
  <button class="edit-only" onclick="manualSave()" style="background:#1b3a1b;color:#81c784;border:1px solid #2e6b2e;border-radius:10px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;">
    💾 保存する
  </button>
  <div id="saveDone" style="display:none;color:#4caf50;font-size:12px;text-align:center;margin-top:6px;">✅ 保存しました！</div>
</div>
<div id="shareBtn" class="edit-only">
<!-- Share -->
<div style="text-align:center;margin-bottom:32px;">
  <button onclick="generateShareLink()" style="background:#4caf50;color:#fff;border:none;border-radius:10px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%;letter-spacing:1px;">
    🔗 共有リンクを生成
  </button>
  <div id="shareLinkArea" style="display:none;margin-top:14px;">
    <div style="font-size:11px;color:#81c784;margin-bottom:6px;letter-spacing:1px;">以下のURLをLINEで送ってください</div>
    <div id="shareLinkBox" style="background:#111f11;border:1px solid #2e6b2e;border-radius:8px;padding:10px 12px;font-size:11px;color:#a5d6a7;word-break:break-all;text-align:left;margin-bottom:8px;"></div>
    <button onclick="copyShareLink()" style="background:#1b3a1b;color:#81c784;border:1px solid #2e6b2e;border-radius:7px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;width:100%;">
      📋 URLをコピー
    </button>
    <div id="copyDone" style="display:none;color:#4caf50;font-size:12px;margin-top:6px;">コピーしました！</div>
  </div>
</div></div>
<!-- Schedule -->
<div class="section-title">▸ 試合予定</div>
<div id="scheduleList"></div>
<button class="btn-add-schedule" onclick="openScheduleModal(-1)">＋ 試合予定を追加</button>

<!-- Schedule Modal -->
<div class="modal-overlay edit-only" id="scheduleModalOverlay">
  <div class="modal">
    <h2 id="schedModalTitle">試合予定を追加</h2>
    <div style="margin-bottom:14px;">
      <div style="font-size:11px;color:#81c784;margin-bottom:6px;">日付</div>
      <input type="date" id="schedDate" style="width:100%;background:#0f1f0f;border:1px solid #2e6b2e;border-radius:6px;color:#fff;font-size:14px;padding:8px 10px;outline:none;color-scheme:dark;">
    </div>
    <div style="margin-bottom:10px;">
      <div style="font-size:11px;color:#81c784;margin-bottom:6px;">チームA</div>
      <select id="schedTeamA" style="width:100%;background:#0f1f0f;border:1px solid #2e6b2e;border-radius:6px;color:#fff;font-size:14px;padding:8px 10px;outline:none;"></select>
    </div>
    <div style="text-align:center;color:#4caf50;font-weight:700;font-size:14px;margin-bottom:10px;">vs</div>
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;color:#81c784;margin-bottom:6px;">チームB</div>
      <select id="schedTeamB" style="width:100%;background:#0f1f0f;border:1px solid #2e6b2e;border-radius:6px;color:#fff;font-size:14px;padding:8px 10px;outline:none;"></select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-save" onclick="saveSchedule()">保存</button>
      <button class="btn btn-clear" id="schedDeleteBtn" onclick="deleteSchedule()">削除</button>
      <button class="btn btn-cancel" onclick="closeScheduleModal()">キャンセル</button>

</div>

<!-- Modal -->
<div class="modal-overlay edit-only" id="modalOverlay">
  <div class="modal">
    <h2>試合結果入力</h2>
    <div class="matchup" id="modalMatchup"></div>
    <div class="score-row">
      <span class="score-label" id="scoreLabel1"></span>
      <input class="score-input" type="number" min="0" max="99" id="scoreA" placeholder="0">
      <span class="score-sep">－</span>
      <input class="score-input" type="number" min="0" max="99" id="scoreB" placeholder="0">
      <span class="score-label right" id="scoreLabel2"></span>
    </div>
    <div class="modal-btns">
      <button class="btn btn-save" onclick="saveResult()">保存</button>
      <button class="btn btn-clear" onclick="clearResult()">削除</button>
      <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>
const TEAMS = [
  { id: 0, name: 'FUNPLACE横浜',        short: 'FUN' },
  { id: 1, name: 'AFC横浜',             short: 'AFC' },
  { id: 2, name: 'CCF',                 short: 'CCF' },
  { id: 3, name: 'FC Valda',            short: 'VAL' },
  { id: 4, name: 'CF.Supernova',        short: 'SUP' },
  { id: 5, name: 'Yokohama Noble Pride',short: 'YNP' },
  { id: 6, name: 'SANNO Second',        short: 'SAN' },
  { id: 7, name: '東湘FC',              short: 'TSK' },
];
const N = TEAMS.length;
const MY_TEAM = 0;
const TOTAL_MATCHES = N * (N - 1) / 2;

let results = {};

function key(i, j) {
  const lo = Math.min(i,j), hi = Math.max(i,j);
  return lo+'_'+hi;
}
function getResult(i, j) { return results[key(i,j)] || null; }
function scoreFor(i, j) {
  const r = getResult(i,j); if(!r) return null;
  return i < j ? r.a : r.b;
}
function scoreAgainst(i, j) {
  const r = getResult(i,j); if(!r) return null;
  return i < j ? r.b : r.a;
}

function load() {
  try {
    const s = localStorage.getItem('ksl3l_2026');
    if(s) results = JSON.parse(s);
  } catch(e) {}
}
function save() {
  localStorage.setItem('ksl3l_2026', JSON.stringify(results));;
}

// ===== SCHEDULE =====
// schedules: [{date:'2026-06-01', teamA: 0, teamB: 1}, ...]
let schedules = [];
let editingScheduleIdx = -1;

function loadSchedules() {
  try {
    const s = localStorage.getItem('ksl3l_2026_schedule');
    if(s) schedules = JSON.parse(s);
  } catch(e) {}
}
function saveSchedules() {
  localStorage.setItem('ksl3l_2026_schedule', JSON.stringify(schedules));;
}

const DAYS_JA = ['日','月','火','水','木','金','土'];
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return { main: (d.getMonth()+1)+'/'+(d.getDate()), sub: '('+DAYS_JA[d.getDay()]+')' };
}

function renderSchedule() {
  const container = document.getElementById('scheduleList');
  if(!container) return;
  if(schedules.length === 0) {
    container.innerHTML = '<div class="schedule-empty">試合予定はありません</div>';
    return;
  }
  const today = new Date().toISOString().slice(0,10);
  const sorted = schedules.map((s,i) => ({...s, idx:i})).sort((a,b) => a.date.localeCompare(b.date));
  // FUNPLACE横浜の次の試合
  const myNextIdx = sorted.findIndex(s => s.date >= today && (s.teamA === MY_TEAM || s.teamB === MY_TEAM));
  let html = '';
  sorted.forEach((s, si) => {
    const involvesMe = s.teamA === MY_TEAM || s.teamB === MY_TEAM;
    const isMyNext = si === myNextIdx;
    const {main, sub} = formatDate(s.date);
    const nameA = TEAMS[s.teamA]?.name || '';
    const nameB = TEAMS[s.teamB]?.name || '';
    const highlightA = s.teamA === MY_TEAM ? ' style="color:#ffeb3b"' : '';
    const highlightB = s.teamB === MY_TEAM ? ' style="color:#ffeb3b"' : '';
    html += '<div class="schedule-item'+(isMyNext?' next':'')+'" onclick="openScheduleModal('+s.idx+')">'+
      '<div class="schedule-date">'+main+'<span class="day-label">'+sub+'</span></div>'+
      '<div class="schedule-opponent"><span'+highlightA+'>'+nameA+'</span> <span style="color:#4caf50;font-size:11px">vs</span> <span'+highlightB+'>'+nameB+'</span></div>'+
      (isMyNext ? '<span class="schedule-next-badge">NEXT</span>' : '<span style="width:36px"></span>')+
      '</div>';
  });
  container.innerHTML = html;
}

function populateTeamSelects() {
  const opts = TEAMS.map(t => '<option value="'+t.id+'">'+t.name+'</option>').join('');
  document.getElementById('schedTeamA').innerHTML = opts;
  document.getElementById('schedTeamB').innerHTML = opts;
}

function openScheduleModal(idx) {
  editingScheduleIdx = idx;
  populateTeamSelects();
  if(idx >= 0 && schedules[idx]) {
    document.getElementById('schedModalTitle').textContent = '試合予定を編集';
    document.getElementById('schedDate').value = schedules[idx].date;
    document.getElementById('schedTeamA').value = schedules[idx].teamA;
    document.getElementById('schedTeamB').value = schedules[idx].teamB;
    document.getElementById('schedDeleteBtn').style.display = '';
  } else {
    document.getElementById('schedModalTitle').textContent = '試合予定を追加';
    document.getElementById('schedDate').value = '';
    document.getElementById('schedTeamA').value = MY_TEAM;
    document.getElementById('schedTeamB').value = 1;
    document.getElementById('schedDeleteBtn').style.display = 'none';
  }
  document.getElementById('scheduleModalOverlay').classList.add('open');
}
function closeScheduleModal() {
  document.getElementById('scheduleModalOverlay').classList.remove('open');
}
function saveSchedule() {
  const date = document.getElementById('schedDate').value;
  const teamA = parseInt(document.getElementById('schedTeamA').value);
  const teamB = parseInt(document.getElementById('schedTeamB').value);
  if(!date) { alert('日付を入力してください'); return; }
  if(teamA === teamB) { alert('異なるチームを選んでください'); return; }
  if(editingScheduleIdx >= 0) {
    schedules[editingScheduleIdx] = {date, teamA, teamB};
  } else {
    schedules.push({date, teamA, teamB});
  }
  saveSchedules(); renderSchedule(); closeScheduleModal();
}
function deleteSchedule() {
  if(editingScheduleIdx >= 0) {
    schedules.splice(editingScheduleIdx, 1);
    saveSchedules(); renderSchedule();
  }
  closeScheduleModal();
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('scheduleModalOverlay').addEventListener('click', function(e) {
    if(e.target === this) closeScheduleModal();
  });
});

// ===== SCORE MODAL =====
let modalI = -1, modalJ = -1;

function openModal(i, j) {
  modalI = i; modalJ = j;
  document.getElementById('modalMatchup').innerHTML =
    '<span>'+TEAMS[i].name+'</span><br>vs<br><span>'+TEAMS[j].name+'</span>';
  document.getElementById('scoreLabel1').textContent = TEAMS[i].short;
  document.getElementById('scoreLabel2').textContent = TEAMS[j].short;
  const r = getResult(i,j);
  document.getElementById('scoreA').value = r !== null ? scoreFor(i,j) : '';
  document.getElementById('scoreB').value = r !== null ? scoreFor(j,i) : '';
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('scoreA').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function saveResult() {
  const sa = parseInt(document.getElementById('scoreA').value);
  const sb = parseInt(document.getElementById('scoreB').value);
  if(isNaN(sa)||isNaN(sb)||sa<0||sb<0){ alert('スコアを正しく入力してください'); return; }
  const lo = Math.min(modalI,modalJ), hi = Math.max(modalI,modalJ);
  const sLo = (modalI===lo)?sa:sb, sHi = (modalI===lo)?sb:sa;
  results[key(lo,hi)] = {a:sLo, b:sHi};
  save(); render(); closeModal();
}
function clearResult() {
  delete results[key(modalI,modalJ)];
  save(); render(); closeModal();
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if(e.target === this) closeModal();
  });
});
document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeScheduleModal(); } });

// ===== RENDER CROSS TABLE =====
function renderCross() {
  const tbl = document.getElementById('crossTable');
  let html = '<thead><tr><th>チーム</th>';
  TEAMS.forEach((t,i) => {
    html += '<th class="'+(i===MY_TEAM?'myteam-col':'')+'">'+(i===MY_TEAM?'<span style="color:#ffeb3b">'+t.short+'</span>':t.short)+'</th>';
  });
  html += '</tr></thead><tbody>';
  TEAMS.forEach((teamRow, ri) => {
    html += '<tr class="'+(ri===MY_TEAM?'myteam':'')+'">'+
      '<td>'+(ri===MY_TEAM?'⭐ ':'')+teamRow.name+'</td>';
    TEAMS.forEach((teamCol, ci) => {
      if(ri===ci){ html += '<td class="diagonal">－</td>'; return; }
      const r = getResult(ri,ci);
      const colClass = ci===MY_TEAM?'myteam-col':'';
      if(ri>ci) {
        let inner, cls='';
        if(r!==null){
          const sf=scoreFor(ri,ci), sa=scoreFor(ci,ri);
          cls = sf>sa?'win':sf===sa?'draw':'lose';
          inner = '<span class="result-text '+cls+'">'+sf+'–'+sa+'</span>';
        } else {
          inner = '<span class="result-text empty">－</span>';
        }
        html += '<td class="result-cell '+colClass+'" onclick="openModal('+ri+','+ci+')" title="'+teamRow.name+' vs '+teamCol.name+'">'+inner+'</td>';
      } else {
        let inner='';
        if(r!==null){
          const sf=scoreFor(ri,ci), sa=scoreFor(ci,ri);
          const cls=sf>sa?'win':sf===sa?'draw':'lose';
          inner='<span class="result-text '+cls+'" style="opacity:0.45;font-size:11px">'+sf+'–'+sa+'</span>';
        } else {
          inner='<span class="result-text empty" style="font-size:9px">▪</span>';
        }
        html += '<td class="mirror '+colClass+'" onclick="openModal('+ci+','+ri+')" style="cursor:pointer" title="'+teamRow.name+' vs '+teamCol.name+'">'+inner+'</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody>';
  tbl.innerHTML = html;
}

// ===== STANDINGS =====
function calcStandings() {
  return TEAMS.map((t,i) => {
    let w=0,d=0,l=0,gf=0,ga=0;
    for(let j=0;j<N;j++){
      if(i===j) continue;
      const r=getResult(i,j); if(!r) continue;
      const sf=scoreFor(i,j), sa=scoreFor(j,i);
      gf+=sf; ga+=sa;
      if(sf>sa)w++; else if(sf===sa)d++; else l++;
    }
    return {id:i, name:t.name, played:w+d+l, w, d, l, gf, ga, gd:gf-ga, pts:w*3+d};
  }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
}

function renderStandings() {
  const data = calcStandings();
  const tbl = document.getElementById('standingsTable');
  let html = '<thead><tr><th>#</th><th>チーム</th><th>試</th><th>勝</th><th>分</th><th>負</th><th>得</th><th>失</th><th>得失</th><th>勝点</th></tr></thead><tbody>';
  data.forEach((t,idx) => {
    const rank=idx+1;
    const bc=rank===1?'top1':rank===2?'top2':rank===3?'top3':'';
    const isMe=t.id===MY_TEAM;
    html+='<tr class="'+(isMe?'myteam':'')+'">'+
      '<td><span class="rank-badge '+bc+'">'+rank+'</span></td>'+
      '<td>'+(isMe?'<span class="team-star">⭐</span>':'')+t.name+'</td>'+
      '<td>'+t.played+'</td>'+
      '<td style="color:#66bb6a;font-weight:600">'+t.w+'</td>'+
      '<td style="color:#ffa726">'+t.d+'</td>'+
      '<td style="color:#ef5350">'+t.l+'</td>'+
      '<td>'+t.gf+'</td>'+
      '<td>'+t.ga+'</td>'+
      '<td style="color:'+(t.gd>0?'#66bb6a':t.gd<0?'#ef5350':'#888')+'">'+(t.gd>0?'+':'')+t.gd+'</td>'+
      '<td class="pts">'+t.pts+'</td></tr>';
  });
  html += '</tbody>';
  tbl.innerHTML = html;
}

function renderStats() {
  let w=0,d=0,l=0,gf=0,ga=0;
  for(let j=0;j<N;j++){
    if(j===MY_TEAM) continue;
    const r=getResult(MY_TEAM,j); if(!r) continue;
    const sf=scoreFor(MY_TEAM,j), sa=scoreFor(j,MY_TEAM);
    gf+=sf; ga+=sa;
    if(sf>sa)w++; else if(sf===sa)d++; else l++;
  }
  document.getElementById('stat-played').textContent = w+d+l;
  document.getElementById('stat-w').textContent = w;
  document.getElementById('stat-d').textContent = d;
  document.getElementById('stat-l').textContent = l;
  document.getElementById('stat-gf').textContent = gf;
  document.getElementById('stat-ga').textContent = ga;
  document.getElementById('stat-pts').textContent = w*3+d;
}

function render() {
  renderCross();
  renderStandings();
  renderStats();
}



function manualSave() {
  save();
  saveSchedules();
  document.getElementById('saveDone').style.display = 'block'; document.getElementById('saveDone').textContent = '✅ 保存しました！';
  setTimeout(() => { document.getElementById('saveDone').style.display = 'none'; }, 2000);
}

// ===== SHARE =====
function generateShareLink() {
  const data = {
    r: results,
    s: schedules
  };
  const json = JSON.stringify(data);
  // compress using base64
  const encoded = btoa(unescape(encodeURIComponent(json)));
  const url = location.href.split('?')[0].split('#')[0] + '?d=' + encoded;
  document.getElementById('shareLinkBox').textContent = url;
  document.getElementById('shareLinkArea').style.display = 'block';
  document.getElementById('copyDone').style.display = 'none';
}

function copyShareLink() {
  const url = document.getElementById('shareLinkBox').textContent;
  navigator.clipboard.writeText(url).then(() => {
    document.getElementById('copyDone').style.display = 'block';
    setTimeout(() => { document.getElementById('copyDone').style.display = 'none'; }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('copyDone').style.display = 'block';
    setTimeout(() => { document.getElementById('copyDone').style.display = 'none'; }, 2000);
  });
}

// URLからデータを読み込む
function loadFromURL() {
  const params = new URLSearchParams(location.search);
  const d = params.get('d');
  if (!d) return false;
  try {
    const json = decodeURIComponent(escape(atob(d)));
    const data = JSON.parse(json);
    if (data.r) results = data.r;
    if (data.s) schedules = data.s;
    // 閲覧モード
    document.body.classList.add('view-mode');
    document.getElementById('viewModeBanner').style.display = 'block';
    return true;
  } catch(e) {
    console.error('URL data parse error:', e);
    return false;
  }
}

const fromURL = loadFromURL();
if(!fromURL) {
  load();
  loadSchedules();
  document.getElementById('editModeBanner').style.display = 'block';
}
render();
renderSchedule();
</script>
